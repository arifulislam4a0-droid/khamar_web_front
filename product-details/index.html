<!doctype html>
<html lang="bn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>প্রোডাক্ট বিস্তারিত | খামার কেন্দুয়া এগ্রো</title>
  <meta name="description"
    content="খামার কেন্দুয়া এগ্রোর প্রোডাক্টের বিস্তারিত তথ্য, ছবি, মূল্য, বিবরণ এবং অর্ডার সুবিধা।" />
  <meta name="robots" content="index,follow" />

  <style>
    :root {
      --bg: #f6f8f4;
      --surface: #ffffff;
      --surface-soft: #f2f6ee;
      --line: #dbe6d3;
      --text: #172218;
      --muted: #617061;
      --brand: #2f6b3d;
      --brand-dark: #1f4b2a;
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(31, 49, 28, 0.08);
      --container: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family:
        "Hind Siliguri", "Noto Sans Bengali", system-ui, sans-serif;
      background: linear-gradient(180deg, #f8fbf6 0%, #f4f8f2 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .site-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
    }

    .container {
      width: min(calc(100% - 20px), var(--container));
      margin-inline: auto;
    }

    .top-strip {
      min-height: 38px;
      background: #203a24;
      color: #e6f0e8;
      font-size: 13px;
      display: flex;
      align-items: center;
    }

    .top-strip .container {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(86, 166, 29, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(23, 34, 24, 0.06);
    }

    .header-inner {
      min-height: 72px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.04);
      object-fit: cover;
      object-position: center;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 28px);
      line-height: 1.05;
      font-weight: 800;
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn,
    .btn {
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 15px;
      border-radius: 14px;
      transition: 0.18s ease;
    }

    .icon-btn {
      width: 44px;
      padding: 0;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--brand-dark);
    }

    .btn-soft {
      background: #eef6ea;
      color: var(--brand-dark);
      border: 1px solid #d7e7cf;
    }

    .btn-outline {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .phone-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .section {
      padding: 18px 0 26px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card-body {
      padding: 16px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 30px);
    }

    .section-sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .details-layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 18px;
      align-items: start;
    }

    .gallery-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 14px;
    }

    .gallery-main {
      position: relative;
      background: #f7faf4;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
    }

    .gallery-main img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: contain;
      background: #f7faf4;
    }

    .slide-counter {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(0, 0, 0, 0.05);
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .thumb-scroll {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .thumb {
      border: 2px solid transparent;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 0;
      min-height: 64px;
    }

    .thumb.active {
      border-color: var(--brand);
    }

    .thumb img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .product-price {
      margin: 12px 0 10px;
    }

    .price-now {
      font-size: 20px;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .price-old {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .price-old b {
      text-decoration: line-through;
    }

    .muted {
      color: var(--muted);
    }

    .notice {
      padding: 16px 18px;
      border-radius: 16px;
      background: #fff;
      border: 1px dashed #c6d4bf;
      color: var(--muted);
    }

    .content-text {
      line-height: 1.9;
      white-space: pre-wrap;
      color: var(--text);
    }

    .footer {
      margin-top: auto;
      background: #1e3621;
      color: #e7efe7;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 0.8fr;
      gap: 18px;
      padding: 24px 0;
    }

    .footer p,
    .footer a {
      color: #d2dfd3;
      font-size: 14px;
      line-height: 1.75;
      margin: 0;
    }

    .footer h3,
    .footer h4 {
      margin: 0 0 10px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 24, 16, 0.45);
      z-index: 70;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
    }

    .drawer-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: min(320px, 88vw);
      transform: translateX(-100%);
      z-index: 80;
      background: #fff;
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
      transition: 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .drawer.show {
      transform: translateX(0);
    }

    .drawer-head {
      min-height: 66px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drawer-body {
      padding: 14px;
      overflow: auto;
    }

    .drawer-links {
      display: grid;
      gap: 10px;
    }

    .drawer-link {
      display: block;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-weight: 600;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 24, 16, 0.55);
      display: none;
      z-index: 110;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(100%, 620px);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 22px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-weight: 700;
    }

    .input,
    .textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #cad8c4;
      background: #fff;
      outline: none;
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
    }

    .full {
      grid-column: 1 / -1;
    }

    @media (max-width: 1100px) {
      .details-layout {
        grid-template-columns: 1fr;
      }

      .footer-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .header-inner {
        grid-template-columns: auto 1fr;
      }

      .header-right {
        grid-column: 1 / -1;
      }

      .thumb-scroll {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .container {
        width: min(calc(100% - 16px), var(--container));
      }

      .top-strip .container {
        display: block;
        padding: 8px 0;
      }

      .header-inner {
        min-height: 66px;
      }

      .brand-title {
        font-size: 20px;
      }

      .brand-sub {
        font-size: 11px;
      }

      .phone-pill {
        width: 100%;
        justify-content: center;
      }

      .thumb-scroll {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .gallery-card {
        padding: 10px;
      }

      .card-body {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="site-shell">
    <div id="header"></div>
    <div id="drawerWrap"></div>

    <main class="section">
      <div class="container">
        <div id="detailsWrap" class="stack"></div>
      </div>
    </main>

    <div id="footer"></div>
  </div>

  <div id="orderModalBackdrop" class="modal-backdrop">
    <div id="orderModalContent" class="modal"></div>
  </div>

  <script>
    const SITE_NAME = "খামার কেন্দুয়া এগ্রো";
    const SITE_PHONE = "০১৬০৯৩৪৭৭৪৬";
    const BACKEND_ORIGIN = location.origin.includes(":5000")
      ? location.origin
      : "https://kka-api.onrender.com";
    const API_BASE = `${BACKEND_ORIGIN}/api`;

    const LOGO_URL = "https://kka-api.onrender.com/uploads/logo/logo.webp";
    function escapeHtml(v = "") {
      return String(v).replace(
        /[&<>"']/g,
        (m) =>
          ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          })[m],
      );
    }

    function money(v) {
      if (v === null || v === undefined || v === "") return "";
      const n = Number(v);
      if (Number.isNaN(n)) return v;
      return new Intl.NumberFormat("bn-BD").format(n) + " টাকা";
    }

    function fullImageUrl(url = "") {
      if (!url) return LOGO_URL;
      if (
        url.startsWith("http://") ||
        url.startsWith("https://") ||
        url.startsWith("data:")
      )
        return url;
      return `${BACKEND_ORIGIN}${url}`;
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, options);
      let data = null;
      try {
        data = await res.json();
      } catch (e) { }
      if (!res.ok) throw new Error(data?.message || "রিকোয়েস্ট সম্পন্ন হয়নি");
      return data;
    }

    function showToast(message, type = "success") {
      let host = document.getElementById("toastHost");
      if (!host) {
        host = document.createElement("div");
        host.id = "toastHost";
        host.style.cssText =
          "position:fixed;right:12px;bottom:12px;z-index:200;display:grid;gap:10px;max-width:min(90vw,360px)";
        document.body.appendChild(host);
      }

      const item = document.createElement("div");
      item.style.cssText = `padding:13px 15px;border-radius:15px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.2);background:${type === "error" ? "#b42318" : "#2f6b3d"}`;
      item.textContent = message;
      host.appendChild(item);

      setTimeout(() => {
        item.style.opacity = "0";
        item.style.transform = "translateY(8px)";
        item.style.transition = ".25s";
      }, 2700);

      setTimeout(() => item.remove(), 3100);
    }

    function buildHeader({ subtitle = "" } = {}) {
      return `
       

        <header class="header">
          <div class="container header-inner">
            <div class="brand">
              <button class="icon-btn btn-outline" onclick="toggleDrawer(true)">☰</button>
              <a href="../index.html" class="brand">
                <img src="${LOGO_URL}" class="logo" alt="লোগো">
                <div>
                  <div class="brand-title">${SITE_NAME}</div>
                  <div class="brand-sub">${subtitle || "বিশ্বস্ত খামার ফার্মেসি"}</div>
                </div>
              </a>
            </div>
            <div></div>
            <div class="header-right">
              <div class="phone-pill">📞 <a href="tel:01609347746">${SITE_PHONE}</a></div>
            </div>
          </div>
        </header>
      `;
    }

    function buildFooter() {
      return `
        <footer class="footer">
          <div class="container footer-grid">
            <div>
              <h3>${SITE_NAME}</h3>
              <p>আমাদের ওয়েবসাইট থেকে আপনার খামারের জন্য যেকোনো প্রকার প্রোডাক্ট সহজেই ঘরে বসেই অর্ডার করতে পারবেন।</p>
            </div>
            <div>
              <h4>যোগাযোগ</h4>
              <p>মোবাইল: <a href="tel:01609347746">${SITE_PHONE}</a></p>
              <p>ওয়েবসাইটে অর্ডার করার জন্য বা প্রোডাক্ট নিয়ে যেকোনো প্রয়োজনে আমাদের সাথে যোগাযোগ করতে পারেন।</p>
            </div>
            <div>
              <h4>ডেভেলপার</h4>
              <p>ওয়েবসাইট তৈরি করেছেন : Md. Ariful Islam</p>
              <p>যেকোনো ওয়েবসাইট তৈরির জন্য যোগাযোগ করুন : ০১৬০৯৩৪৭৭৪৬</p>
            </div>
          </div>

          

         <div class="copyright"
     style="width:100%; text-align:center; margin:0 auto; padding:12px 10px; font-size:13px; border-top:1px solid rgba(255,255,255,0.1); color:#cfd8cf; background:#1b2f1e;">
  © 2026 ${SITE_NAME}. All Rights Reserved.
</div>   </footer>
      `;
    }

    function buildDrawer(categories = []) {
      const list = categories.length
        ? categories
          .map(
            (cat) =>
              `<a class="drawer-link" href="../index.html#cat-${cat.slug}" onclick="toggleDrawer(false)">${escapeHtml(cat.name)}</a>`,
          )
          .join("")
        : `<div class="notice">কোনো ক্যাটাগরি পাওয়া যায়নি।</div>`;

      return `
        <div id="drawerBackdrop" class="drawer-backdrop" onclick="toggleDrawer(false)"></div>
        <aside id="drawer" class="drawer">
          <div class="drawer-head">
            <strong>ক্যাটাগরি মেনু</strong>
            <button class="icon-btn btn-outline" onclick="toggleDrawer(false)">✕</button>
          </div>
          <div class="drawer-body">
            <div class="drawer-links">${list}</div>
          </div>
        </aside>
      `;
    }

    function toggleDrawer(show) {
      document.getElementById("drawer")?.classList.toggle("show", !!show);
      document
        .getElementById("drawerBackdrop")
        ?.classList.toggle("show", !!show);
    }

    function priceHtml(product) {
      const offer =
        product.offerPrice !== null &&
        product.offerPrice !== undefined &&
        product.offerPrice !== "";
      return offer
        ? `<div class="price-old">রেগুলার মূল্য: <b>${money(product.price)}</b></div><div class="price-now">অফার মূল্য: ${money(product.offerPrice)}</div>`
        : `<div class="price-now">মূল্য: ${money(product.price)}</div>`;
    }

    function shareLink(url, title = "প্রোডাক্ট") {
      if (navigator.share) {
        navigator.share({ title, url }).catch(() => { });
        return;
      }

      navigator.clipboard.writeText(url).then(() => {
        showToast("লিংক কপি হয়েছে");
      });
    }

    function orderModalTemplate(product) {
      return `
        <div class="modal-head">
          <div>
            <h3 style="margin:0 0 6px">অর্ডার করুন</h3>
            <div class="muted">${escapeHtml(product.name || "প্রোডাক্ট")}</div>
          </div>
          <button class="icon-btn btn-outline" onclick="closeOrderModal()">✕</button>
        </div>

        <form id="orderForm" class="form-grid">
          <input type="hidden" name="productId" value="${product._id}">

          <div class="field">
            <label>আপনার নাম</label>
            <input class="input" name="customerName" required>
          </div>

          <div class="field">
            <label>আপনার মোবাইল নম্বর</label>
            <input class="input" name="phone" required>
          </div>

          <div class="field full">
            <label>আপনার ঠিকানা</label>
            <textarea class="textarea" name="address" required></textarea>
          </div>

          <div class="field">
            <label>কত পিস প্রোডাক্ট লাগবে</label>
            <input class="input" type="number" name="quantity" min="1" value="1" required>
          </div>

          <div class="field full">
            <button class="btn btn-primary" type="submit">কনফার্ম করুন</button>
          </div>
        </form>
      `;
    }

    function openOrderModal(product) {
      const backdrop = document.getElementById("orderModalBackdrop");
      const content = document.getElementById("orderModalContent");
      if (!backdrop || !content) return;

      content.innerHTML = orderModalTemplate(product);
      backdrop.classList.add("show");

      document
        .getElementById("orderForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = e.target.querySelector("button[type='submit']");
          btn.disabled = true;
          btn.textContent = "সাবমিট হচ্ছে...";

          const payload = Object.fromEntries(
            new FormData(e.target).entries(),
          );
          payload.quantity = Number(payload.quantity);

          try {
            const res = await apiFetch(`${API_BASE}/orders`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            showToast(res.message || "অর্ডার সম্পন্ন হয়েছে");
            closeOrderModal();
          } catch (err) {
            showToast(err.message, "error");
          } finally {
            btn.disabled = false;
            btn.textContent = "কনফার্ম করুন";
          }
        });
    }

    function closeOrderModal() {
      document.getElementById("orderModalBackdrop")?.classList.remove("show");
    }

    let currentImages = [];
    let currentIndex = 0;
    let slideInterval = null;

    function setMainImage(index) {
      if (!currentImages.length) return;

      currentIndex = index;
      const main = document.getElementById("mainProductImage");
      const counter = document.getElementById("slideCounter");

      if (main) {
        main.src = fullImageUrl(currentImages[currentIndex].url);
      }

      if (counter) {
        counter.textContent = `${currentIndex + 1} / ${currentImages.length}`;
      }

      document.querySelectorAll(".thumb").forEach((el, idx) => {
        el.classList.toggle("active", idx === currentIndex);
      });
    }

    function startAutoSlide() {
      if (slideInterval) clearInterval(slideInterval);
      if (currentImages.length <= 1) return;

      slideInterval = setInterval(() => {
        currentIndex = (currentIndex + 1) % currentImages.length;
        setMainImage(currentIndex);
      }, 2800);
    }

    function renderDetails(product) {
      const images = product.images?.length
        ? product.images
        : [{ url: LOGO_URL }];
      currentImages = images;
      currentIndex = 0;

      const thumbHtml = images
        .map(
          (img, i) => `
        <button class="thumb ${i === 0 ? "active" : ""}" type="button" onclick="setMainImage(${i})">
          <img src="${fullImageUrl(img.url)}" alt="thumbnail ${i + 1}">
        </button>
      `,
        )
        .join("");

      const productJson = encodeURIComponent(JSON.stringify(product));

      return `
        <div class="toolbar">
          <div>
            <h1 class="section-title">${escapeHtml(product.name || "প্রোডাক্ট")}</h1>
            <div class="section-sub">${escapeHtml(product.category?.name || "সাধারণ ক্যাটাগরি")}</div>
          </div>
        </div>

        <div class="details-layout">
          <div class="gallery-card">
            <div class="gallery-main">
              <img id="mainProductImage" src="${fullImageUrl(images[0].url)}" alt="প্রোডাক্ট ছবি">
              <div class="slide-counter" id="slideCounter">${images.length ? `1 / ${images.length}` : "1 / 1"}</div>
            </div>

            <div class="thumb-scroll">
              ${thumbHtml}
            </div>
          </div>

          <div class="stack">
            <div class="card">
              <div class="card-body">
                <h2 style="margin:0 0 8px">${escapeHtml(product.name || "প্রোডাক্ট")}</h2>
                <div class="product-price">${priceHtml(product)}</div>
                <div class="muted" style="line-height:1.85">${escapeHtml(product.description || "বিবরণ দেওয়া হয়নি")}</div>

                <div class="toolbar" style="margin-top:16px">
                  <button class="btn btn-primary" onclick='openOrderModal(JSON.parse(decodeURIComponent("${productJson}")))'>অর্ডার করুন</button>
                  <button class="btn btn-outline" onclick='shareLink("${product.shareUrl}", "${escapeHtml(product.name || "প্রোডাক্ট")}")'>এই লিংক শেয়ার করুন</button>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-body">
                <h3 style="margin:0 0 10px">প্রোডাক্ট এর বিস্তারিত</h3>
                <div class="content-text">${escapeHtml(product.details || "বিস্তারিত দেওয়া হয়নি")}</div>
              </div>
            </div>

            <div class="card">
              <div class="card-body">
                <div class="toolbar">
                  <button class="btn btn-primary" onclick='openOrderModal(JSON.parse(decodeURIComponent("${productJson}")))'>অর্ডার করুন</button>
                  <button class="btn btn-outline" onclick='shareLink("${product.shareUrl}", "${escapeHtml(product.name || "প্রোডাক্ট")}")'>প্রোডাক্ট লিংক শেয়ার করুন</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function init() {
      document.getElementById("header").innerHTML = buildHeader({
        subtitle: "প্রোডাক্টের বিস্তারিত",
      });
      document.getElementById("footer").innerHTML = buildFooter();

      const slug = new URLSearchParams(location.search).get("slug");

      if (!slug) {
        document.getElementById("detailsWrap").innerHTML =
          `<div class="notice">সঠিক প্রোডাক্ট লিংক পাওয়া যায়নি।</div>`;
        return;
      }

      try {
        const home = await apiFetch(`${API_BASE}/public/home`);
        document.getElementById("drawerWrap").innerHTML = buildDrawer(
          home.data?.categories || [],
        );
      } catch (e) {
        document.getElementById("drawerWrap").innerHTML = buildDrawer([]);
      }

      try {
        const res = await apiFetch(
          `${API_BASE}/public/products/${encodeURIComponent(slug)}`,
        );
        const product = res.data;

        document.title = `${product?.name || "প্রোডাক্ট"} | খামার কেন্দুয়া এগ্রো`;
        document.getElementById("detailsWrap").innerHTML =
          renderDetails(product);
        startAutoSlide();
      } catch (err) {
        document.getElementById("detailsWrap").innerHTML =
          `<div class="notice">প্রোডাক্ট পাওয়া যায়নি বা ডাটা লোড করা যায়নি।</div>`;
      }
    }

    document
      .getElementById("orderModalBackdrop")
      .addEventListener("click", (e) => {
        if (e.target.id === "orderModalBackdrop") closeOrderModal();
      });

    init();
  </script>
</body>

</html>
